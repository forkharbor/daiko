<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>販売代行計算表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #d1d9e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
      gap: 24px;
    }

    h1 {
      font-size: 1.3rem;
      color: #e0e6f0;
      font-weight: bold;
      letter-spacing: 0.04em;
    }

    .card {
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-title {
      font-size: 0.78rem;
      color: #4a90d9;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── フィールド ── */
    .field label {
      display: block;
      font-size: 0.72rem;
      color: #8899aa;
      font-weight: bold;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .field input[type="text"] {
      width: 100%;
      background: #0d1420;
      border: 1px solid #2a3a50;
      border-radius: 8px;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input[type="text"]:focus { border-color: #2563eb; }
    .field input[type="text"]::placeholder { color: #3a4a60; }

    .field .input-with-prefix {
      display: flex;
      align-items: center;
      background: #0d1420;
      border: 1px solid #2a3a50;
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .field .input-with-prefix:focus-within { border-color: #2563eb; }
    .field .input-prefix {
      padding: 12px 0 12px 14px;
      font-size: 1rem;
      color: #8899aa;
    }
    .field .input-with-prefix input {
      flex: 1;
      background: none;
      border: none;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
      text-align: right;
    }
    .field .input-with-prefix input::placeholder { color: #3a4a60; }

    /* ── 固定表示行 ── */
    .fixed-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .fixed-row-label {
      font-size: 0.72rem;
      color: #8899aa;
      font-weight: bold;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fixed-badge {
      font-size: 0.6rem;
      color: #4a5568;
      border: 1px solid #2a3a50;
      border-radius: 3px;
      padding: 1px 5px;
      letter-spacing: 0.03em;
    }
    .fixed-val {
      font-size: 0.95rem;
      color: #4a5568;
      font-weight: bold;
    }

    /* ── カスタムドロップダウン ── */
    .cs-wrap { position: relative; }
    .cs-trigger {
      width: 100%;
      background: #0d1420;
      border: 1px solid #2a3a50;
      border-radius: 8px;
      color: #e0e6f0;
      font-size: 1rem;
      padding: 12px 36px 12px 14px;
      outline: none;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .cs-trigger.placeholder { color: #3a4a60; }
    .cs-wrap.open .cs-trigger { border-color: #2563eb; }
    .cs-arrow {
      flex-shrink: 0;
      font-size: 0.7rem;
      color: #4a5568;
      transition: transform 0.15s;
    }
    .cs-wrap.open .cs-arrow { transform: rotate(180deg); }
    .cs-opts {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #111827;
      border: 1px solid #2563eb;
      border-radius: 8px;
      overflow: hidden;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .cs-wrap.open .cs-opts { display: block; }
    .cs-opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #e0e6f0;
      gap: 12px;
      transition: background 0.1s;
    }
    .cs-opt:hover { background: #1a2a45; }
    .cs-opt.selected { background: #1d3460; }
    .cs-opt.is-placeholder { color: #3a4a60; justify-content: flex-start; }
    .cs-opt-name { white-space: nowrap; }
    .cs-opt-price { color: #8899aa; white-space: nowrap; font-size: 0.88rem; }

    /* ── Yahoo遷移ボタン ── */
    .btn-yahoo {
      background: #ff0033;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-yahoo:hover { background: #cc0029; }

    /* ── 試算ボタン ── */
    .btn-calc {
      width: 100%;
      padding: 15px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      margin-top: 4px;
      font-family: inherit;
    }
    .btn-calc:hover { background: #1e40af; }
    .btn-calc:active { background: #1e3a9f; }

    /* ── 結果カード ── */
    .result-card {
      border: 1px solid #1e2a3a;
      border-radius: 12px;
      overflow: hidden;
    }
    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      gap: 12px;
    }
    .result-row + .result-row { border-top: 1px solid #1e2a3a; }
    .result-label {
      font-size: 0.78rem;
      color: #8899aa;
      font-weight: bold;
      white-space: nowrap;
    }
    .result-value {
      font-size: 1.05rem;
      font-weight: bold;
      text-align: right;
    }
    .result-value.price   { color: #e0e6f0; }
    .result-value.deduct  { color: #8b95a5; }
    .result-value.net-pos { color: #4ade80; font-size: 1.2rem; }
    .result-value.net-neg { color: #f87171; font-size: 1.2rem; }
    .result-row.subtotal-row { background: #0d1420; }
    .result-row.net-row      { background: #0d1420; }

    /* ── 履歴 ── */
    .history-section {
      width: 100%;
      max-width: 480px;
    }
    .history-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .history-header h2 {
      font-size: 0.78rem;
      color: #4a90d9;
      font-weight: bold;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }
    .btn-history-action {
      font-size: 0.68rem;
      color: #8899aa;
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-history-action.selecting { color: #fbbf24; border-color: #92400e; background: #1c1408; }
    .btn-delete-selected:hover { color: #e53e3e; border-color: #e53e3e; }

    .history-empty {
      text-align: center;
      color: #3a4a60;
      font-size: 0.88rem;
      padding: 24px 0;
    }

    .history-item {
      background: #111827;
      border: 1px solid #1e2a3a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .history-item.selected { border-color: #2563eb; background: #0f1e3a; }
    .history-check { display: none; flex-shrink: 0; }
    .select-mode .history-check { display: block; }
    .history-check input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2563eb; cursor: pointer; }
    .history-body { flex: 1; min-width: 0; }
    .history-keyword {
      font-size: 0.95rem;
      color: #dde6f0;
      font-weight: bold;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-prices {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .history-price-item { display: flex; align-items: center; gap: 5px; }
    .history-price-label { font-size: 0.65rem; color: #4a5568; white-space: nowrap; }
    .history-price-val   { font-size: 0.8rem; font-weight: bold; color: #e0e6f0; }
    .history-price-val.pos { color: #4ade80; }
    .history-price-val.neg { color: #f87171; }
    .history-datetime { font-size: 0.7rem; color: #4a5568; }
    .history-edit-btn {
      display: block;
      flex-shrink: 0;
      font-size: 0.68rem;
      color: #4a5568;
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 5px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .history-edit-btn:hover { color: #8899aa; border-color: #4a5568; }
    .select-mode .history-edit-btn { display: none; }

    /* ── 編集モード ── */
    .edit-banner {
      display: none;
      background: #0f1f10;
      border: 1px solid #166534;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #4ade80;
      font-weight: bold;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .edit-banner.show { display: flex; }
    .btn-cancel-edit {
      font-size: 0.68rem;
      color: #4a5568;
      background: none;
      border: 1px solid #2a3a50;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-cancel-edit:hover { color: #8899aa; }
  </style>
</head>
<body>

  <h1>販売代行計算表</h1>

  <div class="card">
    <!-- 編集モードバナー -->
    <div class="edit-banner" id="edit-banner">
      <span>履歴を編集中</span>
      <button class="btn-cancel-edit" onclick="cancelEdit()">キャンセル</button>
    </div>

    <!-- 商品名 -->
    <div class="field">
      <label>商品名</label>
      <input type="text" id="inp-keyword" placeholder="例：ポケモンカード 151 box" autocomplete="off">
    </div>

    <!-- 下限価格 + Yahoo遷移 -->
    <div class="field">
      <label>下限価格（円以上）</label>
      <div style="display:flex;gap:10px;align-items:stretch">
        <div class="input-with-prefix" style="flex:1">
          <span class="input-prefix">¥</span>
          <input type="text" id="inp-minprice" placeholder="0" inputmode="numeric" autocomplete="off">
        </div>
        <button class="btn-yahoo" onclick="openYahoo()">Yahoo!で確認</button>
      </div>
    </div>

    <!-- Yahoo!ショッピング販売価格 -->
    <div class="field">
      <label>Yahoo!ショッピング販売価格</label>
      <div class="input-with-prefix">
        <span class="input-prefix">¥</span>
        <input type="text" id="inp-price" placeholder="0" inputmode="numeric" autocomplete="off" oninput="onInputChange()">
      </div>
    </div>

    <!-- Yahoo!販売手数料（固定6%） -->
    <div class="fixed-row">
      <span class="fixed-row-label">
        Yahoo!ショッピング販売手数料
        <span class="fixed-badge">固定</span>
      </span>
      <span class="fixed-val">6%</span>
    </div>

    <!-- 荷物のサイズ（顧客への送料） -->
    <div class="field">
      <label>荷物のサイズ（顧客への送料）</label>
      <input type="hidden" id="inp-size" value="">
      <div class="cs-wrap" id="cs-main">
        <button type="button" class="cs-trigger placeholder" onclick="csToggle('cs-main')">
          <span id="cs-main-label">選択してください</span>
          <span class="cs-arrow">▼</span>
        </button>
        <div class="cs-opts" id="cs-main-opts"></div>
      </div>
    </div>

    <!-- 代行手数料（固定10%） -->
    <div class="fixed-row">
      <span class="fixed-row-label">
        代行手数料
        <span class="fixed-badge">固定</span>
      </span>
      <span class="fixed-val">10%</span>
    </div>

    <!-- 代行依頼主の買値 -->
    <div class="field">
      <label>代行依頼主の買値</label>
      <div class="input-with-prefix">
        <span class="input-prefix">¥</span>
        <input type="text" id="inp-cost" placeholder="0" inputmode="numeric" autocomplete="off" oninput="onInputChange()">
      </div>
    </div>

    <button class="btn-calc" id="btn-calc" onclick="doCalc()">試算する</button>

    <!-- 結果 -->
    <div class="result-card" id="result-card" style="display:none">
      <div class="result-row">
        <span class="result-label">販売価格</span>
        <span class="result-value price" id="res-price">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">Yahoo!手数料 (6%)</span>
        <span class="result-value deduct" id="res-yahoo-fee">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">送料</span>
        <span class="result-value deduct" id="res-shipping">-</span>
      </div>
      <div class="result-row subtotal-row">
        <span class="result-label">小計</span>
        <span class="result-value price" id="res-subtotal">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">代行手数料 (小計の10%)</span>
        <span class="result-value deduct" id="res-agency-fee">-</span>
      </div>
      <div class="result-row net-row">
        <span class="result-label">代行依頼主の手取り</span>
        <span class="result-value" id="res-net">-</span>
      </div>
      <div class="result-row" id="res-row-profit" style="display:none">
        <span class="result-label">あなたの利益</span>
        <span class="result-value" id="res-profit">-</span>
      </div>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="history-section">
    <div class="history-header">
      <h2>履歴</h2>
      <button class="btn-history-action" id="btn-select" onclick="toggleSelectMode()">選択</button>
      <button class="btn-history-action btn-delete-selected" id="btn-delete" onclick="deleteSelected()" style="display:none">削除</button>
    </div>
    <div id="history-list"></div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCfvqQWLB8NJqmaH0k2G0wPcbJJjz2Vu4A",
    authDomain: "kaimemo-58bad.firebaseapp.com",
    projectId: "kaimemo-58bad",
    storageBucket: "kaimemo-58bad.firebasestorage.app",
    messagingSenderId: "308069117698",
    appId: "1:308069117698:web:c61a57853abb7e8ffb1c1b"
  });
  const db = firebase.firestore();
  const docRef = db.collection('data').doc('raccoo-price');

  const YAHOO_FEE_RATE  = 0.06;
  const AGENCY_FEE_RATE = 0.10;
  const MAX_HISTORY = 100;

  const SHIPPING_SIZES = [
    { value: '385',  name: 'ネコポス',        price: '¥385' },
    { value: '704',  name: '宅急便コンパクト', price: '¥704' },
    { value: '1232', name: '60サイズ',         price: '¥1,232' },
    { value: '1705', name: '80サイズ',         price: '¥1,705' },
    { value: '2013', name: '100サイズ',        price: '¥2,013' },
    { value: '2332', name: '120サイズ',        price: '¥2,332' },
    { value: '2706', name: '140サイズ',        price: '¥2,706' },
    { value: '3025', name: '160サイズ',        price: '¥3,025' },
  ];

  function csInit(wrapId, hiddenId, labelId, defaultValue) {
    const opts = document.getElementById(wrapId + '-opts');
    opts.innerHTML = SHIPPING_SIZES.map(s => `
      <div class="cs-opt${s.value === defaultValue ? ' selected' : ''}"
           onclick="csSelect('${wrapId}','${hiddenId}','${labelId}','${s.value}','${s.name}',this)">
        <span class="cs-opt-name">${s.name}</span>
        <span class="cs-opt-price">${s.price}</span>
      </div>`).join('');
  }

  function csToggle(wrapId) {
    const wrap = document.getElementById(wrapId);
    const isOpen = wrap.classList.contains('open');
    document.querySelectorAll('.cs-wrap.open').forEach(w => w.classList.remove('open'));
    if (!isOpen) wrap.classList.add('open');
  }

  function csSelect(wrapId, hiddenId, labelId, value, name, el) {
    document.getElementById(hiddenId).value = value;
    const labelEl = document.getElementById(labelId);
    labelEl.textContent = name;
    const trigger = document.getElementById(wrapId).querySelector('.cs-trigger');
    trigger.classList.remove('placeholder');
    document.querySelectorAll('#' + wrapId + '-opts .cs-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById(wrapId).classList.remove('open');
    onInputChange();
  }

  function csSetValue(wrapId, hiddenId, labelId, value) {
    const size = SHIPPING_SIZES.find(s => s.value === String(value));
    if (!size) return;
    document.getElementById(hiddenId).value = size.value;
    document.getElementById(labelId).textContent = size.name;
    document.getElementById(wrapId).querySelector('.cs-trigger').classList.remove('placeholder');
    document.querySelectorAll('#' + wrapId + '-opts .cs-opt').forEach(o => {
      o.classList.toggle('selected', o.querySelector('.cs-opt-name').textContent === size.name);
    });
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.cs-wrap')) {
      document.querySelectorAll('.cs-wrap.open').forEach(w => w.classList.remove('open'));
    }
  });
  let records = [];
  let selectMode = false;
  let selectedIdxs = new Set();
  let editingIdx = null;

  function parsePrice(raw) {
    const digits = String(raw).replace(/[^\d]/g, '');
    if (!digits) return null;
    const n = Number(digits);
    return (isFinite(n) && n > 0) ? n : null;
  }

  function fmt(n) {
    return '¥' + Math.abs(n).toLocaleString('ja-JP');
  }

  function formatDatetime(d) {
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function onInputChange() {
    document.getElementById('result-card').style.display = 'none';
  }

  function doCalc() {
    const price = parsePrice(document.getElementById('inp-price').value);
    const shippingVal = document.getElementById('inp-size').value;

    if (!price) { document.getElementById('inp-price').focus(); return; }
    if (!shippingVal) { csToggle('cs-main'); return; }

    const shipping  = parseInt(shippingVal);
    const yahooFee  = Math.round(price * YAHOO_FEE_RATE);
    const subtotal  = price - yahooFee - shipping;
    const agencyFee = Math.round(subtotal * AGENCY_FEE_RATE);
    const net       = subtotal - agencyFee;
    const cost      = parsePrice(document.getElementById('inp-cost').value);

    document.getElementById('res-price').textContent      = fmt(price);
    document.getElementById('res-yahoo-fee').textContent  = '-' + fmt(yahooFee);
    document.getElementById('res-shipping').textContent   = '-' + fmt(shipping);
    document.getElementById('res-subtotal').textContent   = fmt(subtotal);
    document.getElementById('res-agency-fee').textContent = '-' + fmt(agencyFee);

    const elNet = document.getElementById('res-net');
    elNet.textContent = (net >= 0 ? '+' : '-') + fmt(net);
    elNet.className   = 'result-value ' + (net >= 0 ? 'net-pos' : 'net-neg');

    const rowProfit = document.getElementById('res-row-profit');
    if (cost != null) {
      const profit = net - cost;
      const elProfit = document.getElementById('res-profit');
      elProfit.textContent = (profit >= 0 ? '+' : '-') + fmt(profit);
      elProfit.className   = 'result-value ' + (profit >= 0 ? 'net-pos' : 'net-neg');
      rowProfit.style.display = '';
    } else {
      rowProfit.style.display = 'none';
    }

    document.getElementById('result-card').style.display = '';

    const keyword = document.getElementById('inp-keyword').value.trim();
    const sizeName = SHIPPING_SIZES.find(s => s.value === String(shipping))?.name ?? '';

    if (editingIdx !== null) {
      // 編集モード：既存レコードを上書き
      records[editingIdx] = {
        ...records[editingIdx],
        keyword: keyword || '（商品名なし）',
        price, shipping, shippingLabel: sizeName, yahooFee, subtotal, agencyFee, net,
        cost: cost ?? null,
        profit: cost != null ? net - cost : null,
      };
      docRef.set({ list: records }).catch(err => console.error('保存エラー:', err.message));
      cancelEdit();
    } else {
      // 新規モード
      const entry = {
        keyword: keyword || '（商品名なし）',
        price, shipping, shippingLabel: sizeName, yahooFee, subtotal, agencyFee, net,
        cost: cost ?? null,
        profit: cost != null ? net - cost : null,
        datetime: formatDatetime(new Date())
      };
      const filtered = records.filter(r => !(r.keyword === entry.keyword && r.price === entry.price));
      filtered.unshift(entry);
      records = filtered.slice(0, MAX_HISTORY);
      docRef.set({ list: records }).catch(err => console.error('保存エラー:', err.message));
    }
  }

  function toggleSelectMode() {
    selectMode = !selectMode;
    selectedIdxs.clear();
    const btn = document.getElementById('btn-select');
    btn.textContent = selectMode ? 'キャンセル' : '選択';
    btn.classList.toggle('selecting', selectMode);
    document.getElementById('btn-delete').style.display = 'none';
    renderHistory();
  }

  function toggleSelectItem(idx) {
    if (selectedIdxs.has(idx)) selectedIdxs.delete(idx);
    else selectedIdxs.add(idx);
    const delBtn = document.getElementById('btn-delete');
    if (selectedIdxs.size > 0) {
      delBtn.style.display = '';
      delBtn.textContent = `削除（${selectedIdxs.size}件）`;
    } else {
      delBtn.style.display = 'none';
    }
    renderHistory();
  }

  function deleteSelected() {
    if (!selectedIdxs.size) return;
    if (!confirm(`${selectedIdxs.size}件の履歴を削除しますか？`)) return;
    records = records.filter((_, i) => !selectedIdxs.has(i));
    selectedIdxs.clear();
    selectMode = false;
    document.getElementById('btn-select').textContent = '選択';
    document.getElementById('btn-select').classList.remove('selecting');
    document.getElementById('btn-delete').style.display = 'none';
    docRef.set({ list: records }).catch(err => console.error('保存エラー:', err.message));
    renderHistory();
  }

  function openEdit(idx) {
    const r = records[idx];
    if (!r) return;
    editingIdx = idx;
    document.getElementById('inp-keyword').value = r.keyword === '（商品名なし）' ? '' : r.keyword;
    document.getElementById('inp-price').value   = r.price;
    csSetValue('cs-main', 'inp-size', 'cs-main-label', String(r.shipping));
    document.getElementById('inp-cost').value    = r.cost != null ? r.cost : '';
    document.getElementById('edit-banner').classList.add('show');
    document.getElementById('btn-calc').textContent = '更新する';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingIdx = null;
    document.getElementById('inp-keyword').value = '';
    document.getElementById('inp-price').value   = '';
    csSetValue('cs-main', 'inp-size', 'cs-main-label', '');
    document.getElementById('inp-cost').value    = '';
    document.getElementById('edit-banner').classList.remove('show');
    document.getElementById('btn-calc').textContent = '試算する';
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    list.classList.toggle('select-mode', selectMode);
    if (!records.length) {
      list.innerHTML = '<div class="history-empty">履歴がありません</div>';
      return;
    }
    list.innerHTML = records.map((r, i) => {
      const profitHtml = r.profit != null ? `
        <div class="history-price-item">
          <span class="history-price-label">利益</span>
          <span class="history-price-val ${r.profit >= 0 ? 'pos' : 'neg'}">${(r.profit >= 0 ? '+' : '-') + fmt(r.profit)}</span>
        </div>` : '';
      return `
        <div class="history-item${selectedIdxs.has(i) ? ' selected' : ''}" onclick="selectMode && toggleSelectItem(${i})">
          <div class="history-check"><input type="checkbox" ${selectedIdxs.has(i) ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelectItem(${i})"></div>
          <div class="history-body">
            <div class="history-keyword">${esc(r.keyword)}</div>
            <div class="history-prices">
              <div class="history-price-item">
                <span class="history-price-label">販売価格</span>
                <span class="history-price-val">${fmt(r.price)}</span>
              </div>
              <div class="history-price-item">
                <span class="history-price-label">手取り</span>
                <span class="history-price-val ${r.net >= 0 ? 'pos' : 'neg'}">${(r.net >= 0 ? '+' : '-') + fmt(r.net)}</span>
              </div>
              ${profitHtml}
            </div>
            <div class="history-datetime">${r.datetime} ／ ${esc(r.shippingLabel)}</div>
          </div>
          <button class="history-edit-btn" onclick="event.stopPropagation(); openEdit(${i})">編集</button>
        </div>`;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  docRef.onSnapshot(snap => {
    records = snap.exists ? (snap.data().list || []) : [];
    renderHistory();
  });

  function openYahoo() {
    const keyword = document.getElementById('inp-keyword').value.trim();
    if (!keyword) { document.getElementById('inp-keyword').focus(); return; }
    const minPrice = parsePrice(document.getElementById('inp-minprice').value);
    const encodedKeyword = keyword.trim().replace(/\s+/g, '+');
    const params = new URLSearchParams({ X: '12', tab_ex: 'commerce' });
    if (minPrice) params.set('pf', minPrice);
    // /1/ = 価格＋送料安い順
    window.open(`https://shopping.yahoo.co.jp/search/${encodedKeyword}/1/?${params.toString()}`, '_blank');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doCalc(); });

  csInit('cs-main',  'inp-size',   'cs-main-label',  '');
</script>

</body>
</html>
